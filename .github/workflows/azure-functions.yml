name: Azure Functions CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
    paths:
      - 'src/Api/**'
      - 'src/Shared/**'
      - 'tests/Api.Tests/**'
      - 'tests/IntegrationTests/**'
      - '.github/workflows/azure-functions.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/Api/**'
      - 'src/Shared/**'
      - 'tests/Api.Tests/**'
      - 'tests/IntegrationTests/**'
      - '.github/workflows/azure-functions.yml'

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  API_PROJECT_PATH: 'src/Api/RajFinancial.Api.csproj'
  SHARED_PROJECT_PATH: 'src/Shared/RajFinancial.Shared.csproj'
  UNIT_TEST_PROJECT: 'tests/Api.Tests/RajFinancial.Api.Tests.csproj'
  INTEGRATION_TEST_PROJECT: 'tests/IntegrationTests/RajFinancial.IntegrationTests.csproj'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test ${{ env.UNIT_TEST_PROJECT }} --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: function-app
          path: ./publish
          retention-days: 1
          include-hidden-files: true

  deploy-dev:
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    name: Deploy to Dev
    needs: build
    environment: development
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: function-app
          path: ./publish

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@0bd707f87c0b6385742bab336c74e1afc61f6369 # v1
        with:
          app-name: func-rajfinancial-dev
          package: ./publish
          respect-funcignore: true

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -sf --max-time 30 https://func-rajfinancial-dev.azurewebsites.net/api/health || echo "Health check returned non-200"

  integration-test-dev:
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    name: Integration Tests (Dev)
    needs: deploy-dev
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run integration tests against dev
        env:
          FunctionsHost__BaseUrl: https://func-rajfinancial-dev.azurewebsites.net
        run: dotnet test ${{ env.INTEGRATION_TEST_PROJECT }} --configuration Release --verbosity normal

  deploy-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    name: Deploy to Prod
    needs: build
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: function-app
          path: ./publish

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@0bd707f87c0b6385742bab336c74e1afc61f6369 # v1
        with:
          app-name: func-rajfinancial-prod
          package: ./publish
          respect-funcignore: true

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          curl -sf --max-time 30 https://func-rajfinancial-prod.azurewebsites.net/api/health || echo "Health check returned non-200"

  integration-test-prod:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    name: Integration Tests (Prod)
    needs: deploy-prod
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run integration tests against prod
        env:
          FunctionsHost__BaseUrl: https://func-rajfinancial-prod.azurewebsites.net
        run: dotnet test ${{ env.INTEGRATION_TEST_PROJECT }} --configuration Release --verbosity normal --filter "Category!=devOnly"
