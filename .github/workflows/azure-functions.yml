name: Azure Functions CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/Api/**'
      - 'src/Shared/**'
      - 'tests/Api.Tests/**'
      - 'tests/IntegrationTests/**'
      - '.github/workflows/azure-functions.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/Api/**'
      - 'src/Shared/**'
      - 'tests/Api.Tests/**'
      - 'tests/IntegrationTests/**'
      - '.github/workflows/azure-functions.yml'

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  API_PROJECT_PATH: 'src/Api/RajFinancial.Api.csproj'
  SHARED_PROJECT_PATH: 'src/Shared/RajFinancial.Shared.csproj'
  UNIT_TEST_PROJECT: 'tests/Api.Tests/RajFinancial.Api.Tests.csproj'
  INTEGRATION_TEST_PROJECT: 'tests/IntegrationTests/RajFinancial.IntegrationTests.csproj'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    outputs:
      migrations_changed: ${{ steps.changes.outputs.migrations }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test ${{ env.UNIT_TEST_PROJECT }} --configuration Release --verbosity normal

      - name: Check for migration changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        with:
          filters: |
            migrations:
              - 'src/Api/Data/Migrations/**'

      - name: Install EF Core tools
        if: steps.changes.outputs.migrations == 'true'
        run: dotnet tool install --global dotnet-ef

      - name: Generate idempotent migration script
        if: steps.changes.outputs.migrations == 'true'
        run: dotnet ef migrations script --idempotent --project ${{ env.API_PROJECT_PATH }} --configuration Release --no-build --output migrations.sql

      - name: Upload migration script
        if: steps.changes.outputs.migrations == 'true'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ef-migration-script
          path: migrations.sql
          retention-days: 30

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: function-app
          path: ./publish
          retention-days: 1
          include-hidden-files: true

  migrate-dev:
    if: (github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')) && needs.build.outputs.migrations_changed == 'true'
    runs-on: ubuntu-latest
    name: Migrate Dev DB
    needs: build
    environment: development
    steps:
      - name: Download migration script
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ef-migration-script

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migration to dev database
        shell: pwsh
        run: |
          Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser
          $token = az account get-access-token --resource "https://database.windows.net/" --query accessToken -o tsv
          Invoke-Sqlcmd -ServerInstance "rajfinancial-dev.database.windows.net" -Database "rajfinancial" -AccessToken $token -InputFile migrations.sql -ErrorAction Stop
          Write-Host "Migration applied successfully to dev database"

  deploy-dev:
    runs-on: ubuntu-latest
    name: Deploy to Dev
    needs: [build, migrate-dev]
    if: ${{ always() && (github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')) && needs.build.result == 'success' && (needs.migrate-dev.result == 'success' || needs.migrate-dev.result == 'skipped') }}
    environment: development
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: function-app
          path: ./publish

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@0bd707f87c0b6385742bab336c74e1afc61f6369 # v1
        with:
          app-name: func-rajfinancial-dev
          package: ./publish
          respect-funcignore: true

      - name: Health check and warmup
        run: |
          BASE_URL="https://func-rajfinancial-dev.azurewebsites.net"
          echo "Waiting for deployment to stabilize..."
          for i in 1 2 3 4 5 6; do
            echo "Health check attempt $i/6..."
            if curl -sf --max-time 10 "$BASE_URL/api/health"; then
              echo ""
              echo "Health check passed!"
              # Warm up auth middleware by hitting a protected endpoint
              # Accept any non-503 response (401 = middleware loaded)
              echo "Warming up auth middleware..."
              for j in 1 2 3 4 5 6; do
                echo "Warmup attempt $j/6..."
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/profile")
                if [ "$STATUS" != "503" ] && [ "$STATUS" != "000" ]; then
                  echo "Auth middleware ready (HTTP $STATUS)"
                  exit 0
                fi
                echo "Auth middleware not ready (HTTP $STATUS), retrying in 10s..."
                sleep 10
              done
              echo "Auth middleware warmup failed after 6 attempts"
              exit 1
            fi
            echo "Health check failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1

  integration-test-dev:
    if: ${{ needs.deploy-dev.result == 'success' }}
    runs-on: ubuntu-latest
    name: Integration Tests (Dev)
    needs: deploy-dev
    environment: development
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Mask sensitive environment variables
        run: |
          echo "::add-mask::${{ secrets.TEST_ADMINISTRATOR_PASSWORD }}"
          echo "::add-mask::${{ secrets.TEST_ADVISOR_PASSWORD }}"
          echo "::add-mask::${{ secrets.TEST_CLIENT_PASSWORD }}"

      - name: Run integration tests against dev
        env:
          FunctionsHost__BaseUrl: https://func-rajfinancial-dev.azurewebsites.net
          SqlConnectionString: ${{ secrets.SQL_CONNECTION_STRING }}
          Entra__TenantId: ${{ secrets.ENTRA_TENANT_ID }}
          Entra__RopcClientId: ${{ secrets.ENTRA_ROPC_CLIENT_ID }}
          Entra__ApiScope: ${{ secrets.ENTRA_API_SCOPE }}
          Entra__TestUsers__Administrator: ${{ secrets.TEST_ADMINISTRATOR_EMAIL }}
          Entra__TestUsers__Client: ${{ secrets.TEST_CLIENT_EMAIL }}
          Entra__TestUsers__Advisor: ${{ secrets.TEST_ADVISOR_EMAIL }}
          TEST_ADMINISTRATOR_PASSWORD: ${{ secrets.TEST_ADMINISTRATOR_PASSWORD }}
          TEST_ADVISOR_PASSWORD: ${{ secrets.TEST_ADVISOR_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: dotnet test ${{ env.INTEGRATION_TEST_PROJECT }} --configuration Release --verbosity normal

  migrate-prod:
    if: (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')) && needs.build.outputs.migrations_changed == 'true'
    runs-on: ubuntu-latest
    name: Migrate Prod DB
    needs: build
    environment: production
    steps:
      - name: Download migration script
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ef-migration-script

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migration to prod database
        shell: pwsh
        run: |
          Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser
          $token = az account get-access-token --resource "https://database.windows.net/" --query accessToken -o tsv
          Invoke-Sqlcmd -ServerInstance "rajfinancial.database.windows.net" -Database "rajfinancial" -AccessToken $token -InputFile migrations.sql -ErrorAction Stop
          Write-Host "Migration applied successfully to prod database"

  deploy-prod:
    runs-on: ubuntu-latest
    name: Deploy to Prod
    needs: [build, migrate-prod]
    if: ${{ always() && (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')) && needs.build.result == 'success' && (needs.migrate-prod.result == 'success' || needs.migrate-prod.result == 'skipped') }}
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: function-app
          path: ./publish

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@0bd707f87c0b6385742bab336c74e1afc61f6369 # v1
        with:
          app-name: func-rajfinancial-prod
          package: ./publish
          respect-funcignore: true

      - name: Health check and warmup
        run: |
          BASE_URL="https://func-rajfinancial-prod.azurewebsites.net"
          echo "Waiting for deployment to stabilize..."
          for i in 1 2 3 4 5 6; do
            echo "Health check attempt $i/6..."
            if curl -sf --max-time 10 "$BASE_URL/api/health"; then
              echo ""
              echo "Health check passed!"
              # Warm up auth middleware by hitting a protected endpoint
              # Accept any non-503 response (401 = middleware loaded)
              echo "Warming up auth middleware..."
              for j in 1 2 3 4 5 6; do
                echo "Warmup attempt $j/6..."
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/profile")
                if [ "$STATUS" != "503" ] && [ "$STATUS" != "000" ]; then
                  echo "Auth middleware ready (HTTP $STATUS)"
                  exit 0
                fi
                echo "Auth middleware not ready (HTTP $STATUS), retrying in 10s..."
                sleep 10
              done
              echo "Auth middleware warmup failed after 6 attempts"
              exit 1
            fi
            echo "Health check failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1

  integration-test-prod:
    if: ${{ always() && needs.deploy-prod.result == 'success' }}
    runs-on: ubuntu-latest
    name: Integration Tests (Prod)
    needs: deploy-prod
    environment: production
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Azure Login with OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Mask sensitive environment variables
        run: |
          echo "::add-mask::${{ secrets.TEST_ADMINISTRATOR_PASSWORD }}"
          echo "::add-mask::${{ secrets.TEST_ADVISOR_PASSWORD }}"
          echo "::add-mask::${{ secrets.TEST_CLIENT_PASSWORD }}"

      - name: Run integration tests against prod
        env:
          FunctionsHost__BaseUrl: https://func-rajfinancial-prod.azurewebsites.net
          SqlConnectionString: ${{ secrets.SQL_CONNECTION_STRING }}
          Entra__TenantId: ${{ secrets.ENTRA_TENANT_ID }}
          Entra__RopcClientId: ${{ secrets.ENTRA_ROPC_CLIENT_ID }}
          Entra__ApiScope: ${{ secrets.ENTRA_API_SCOPE }}
          Entra__TestUsers__Administrator: ${{ secrets.TEST_ADMINISTRATOR_EMAIL }}
          Entra__TestUsers__Client: ${{ secrets.TEST_CLIENT_EMAIL }}
          Entra__TestUsers__Advisor: ${{ secrets.TEST_ADVISOR_EMAIL }}
          TEST_ADMINISTRATOR_PASSWORD: ${{ secrets.TEST_ADMINISTRATOR_PASSWORD }}
          TEST_ADVISOR_PASSWORD: ${{ secrets.TEST_ADVISOR_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: dotnet test ${{ env.INTEGRATION_TEST_PROJECT }} --configuration Release --verbosity normal --filter "Category!=devOnly"
