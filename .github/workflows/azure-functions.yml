name: Azure Functions CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/Api/**'
      - 'src/Shared/**'
      - 'tests/Api.Tests/**'
      - 'tests/IntegrationTests/**'
      - '.github/workflows/azure-functions.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/Api/**'
      - 'src/Shared/**'
      - 'tests/Api.Tests/**'
      - 'tests/IntegrationTests/**'
      - '.github/workflows/azure-functions.yml'

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  API_PROJECT_PATH: 'src/Api/RajFinancial.Api.csproj'
  SHARED_PROJECT_PATH: 'src/Shared/RajFinancial.Shared.csproj'
  UNIT_TEST_PROJECT: 'tests/Api.Tests/RajFinancial.Api.Tests.csproj'
  INTEGRATION_TEST_PROJECT: 'tests/IntegrationTests/RajFinancial.IntegrationTests.csproj'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    outputs:
      migrations_changed: ${{ steps.changes.outputs.migrations }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test ${{ env.UNIT_TEST_PROJECT }} --configuration Release --verbosity normal

      - name: Check for migration changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            migrations:
              - 'src/Api/Data/Migrations/**'

      - name: Install EF Core tools
        if: steps.changes.outputs.migrations == 'true'
        run: dotnet tool install --global dotnet-ef

      - name: Generate idempotent migration script
        if: steps.changes.outputs.migrations == 'true'
        run: dotnet ef migrations script --idempotent --project ${{ env.API_PROJECT_PATH }} --configuration Release --no-build --output migrations.sql

      - name: Upload migration script
        if: steps.changes.outputs.migrations == 'true'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ef-migration-script
          path: migrations.sql
          retention-days: 30

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: function-app
          path: ./publish
          retention-days: 1
          include-hidden-files: true

  migrate-dev:
    if: (github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')) && needs.build.outputs.migrations_changed == 'true'
    runs-on: ubuntu-latest
    name: Migrate Dev DB
    needs: build
    environment: development
    steps:
      - name: Download migration script
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ef-migration-script

      - name: Azure Login with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migration to dev database
        shell: pwsh
        run: |
          Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser
          $token = az account get-access-token --resource "https://database.windows.net/" --query accessToken -o tsv
          Invoke-Sqlcmd -ServerInstance "rajfinancial-dev.database.windows.net" -Database "rajfinancial" -AccessToken $token -InputFile migrations.sql -ErrorAction Stop
          Write-Host "Migration applied successfully to dev database"

  deploy-dev:
    runs-on: ubuntu-latest
    name: Deploy to Dev
    needs: [build, migrate-dev]
    if: ${{ always() && (github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')) && needs.build.result == 'success' && (needs.migrate-dev.result == 'success' || needs.migrate-dev.result == 'skipped') }}
    environment: development
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: function-app
          path: ./publish

      - name: Azure Login with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@0bd707f87c0b6385742bab336c74e1afc61f6369 # v1
        with:
          app-name: func-rajfinancial-dev
          package: ./publish
          respect-funcignore: true

      - name: Health check and warmup
        run: |
          BASE_URL="https://func-rajfinancial-dev.azurewebsites.net"
          echo "Waiting for deployment to stabilize..."
          for i in 1 2 3 4 5 6; do
            echo "Health check attempt $i/6..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/health")
            if [ "$STATUS" != "000" ]; then
              echo "App is responding (HTTP $STATUS)"
              if [ "$STATUS" = "503" ]; then
                echo "Warning: DB connectivity degraded, but app is running"
              fi
              # Warm up auth middleware by hitting a protected endpoint
              # Accept any non-503 response (401 = middleware loaded)
              echo "Warming up auth middleware..."
              for j in 1 2 3 4 5 6; do
                echo "Warmup attempt $j/6..."
                MW_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/profile")
                if [ "$MW_STATUS" != "503" ] && [ "$MW_STATUS" != "000" ]; then
                  echo "Auth middleware ready (HTTP $MW_STATUS)"
                  exit 0
                fi
                echo "Auth middleware not ready (HTTP $MW_STATUS), retrying in 10s..."
                sleep 10
              done
              echo "Auth middleware warmup failed after 6 attempts"
              exit 1
            fi
            echo "No response from app (HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts — app not responding"
          exit 1

  # Integration tests run against deployed dev environment; LivingDoc HTML is always uploaded
  # so the report is viewable even when scenarios fail. Requires secrets configured at the
  # repo or environment level: TEST_*_EMAIL, TEST_*_PASSWORD, SQL_CONNECTION_STRING, ENTRA_*,
  # and Azure OIDC credentials (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID).
  integration-test-dev:
    if: ${{ needs.deploy-dev.result == 'success' }}
    runs-on: ubuntu-latest
    name: Integration Tests (Dev)
    needs: deploy-dev
    environment: development
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602 # v5.0.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Azure Login with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Mask sensitive environment variables
        run: |
          echo "::add-mask::${{ secrets.TEST_ADMINISTRATOR_PASSWORD }}"
          echo "::add-mask::${{ secrets.TEST_ADVISOR_PASSWORD }}"
          echo "::add-mask::${{ secrets.TEST_CLIENT_PASSWORD }}"
          echo "::add-mask::${{ secrets.SQL_CONNECTION_STRING }}"
          echo "::add-mask::${{ secrets.ENTRA_TENANT_ID }}"
          echo "::add-mask::${{ secrets.ENTRA_ROPC_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.ENTRA_API_SCOPE }}"

      - name: Run integration tests against dev
        id: integration_tests
        continue-on-error: true
        env:
          FunctionsHost__BaseUrl: https://func-rajfinancial-dev.azurewebsites.net
          ConnectionStrings__SqlConnectionString: ${{ secrets.SQL_CONNECTION_STRING }}
          # Opt-in allowlist for the dev Azure SQL host so EntityTestDataCleanup's safety guard
          # accepts it. The guard always rejects any host containing "prod" regardless of this list.
          INTEGRATION_TEST_ALLOWED_SQL_HOSTS: rajfinancial-dev.database.windows.net
          Entra__TenantId: ${{ secrets.ENTRA_TENANT_ID }}
          Entra__RopcClientId: ${{ secrets.ENTRA_ROPC_CLIENT_ID }}
          Entra__ApiScope: ${{ secrets.ENTRA_API_SCOPE }}
          Entra__TestUsers__Administrator: ${{ secrets.TEST_ADMINISTRATOR_EMAIL }}
          Entra__TestUsers__Client: ${{ secrets.TEST_CLIENT_EMAIL }}
          Entra__TestUsers__Advisor: ${{ secrets.TEST_ADVISOR_EMAIL }}
          TEST_ADMINISTRATOR_PASSWORD: ${{ secrets.TEST_ADMINISTRATOR_PASSWORD }}
          TEST_ADVISOR_PASSWORD: ${{ secrets.TEST_ADVISOR_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: dotnet test ${{ env.INTEGRATION_TEST_PROJECT }} --configuration Release --verbosity normal

      - name: Customize LivingDoc title and favicon
        if: always()
        shell: pwsh
        run: |
          $html = Get-ChildItem -Path tests/IntegrationTests/bin/Release -Recurse -Filter LivingDoc.html | Select-Object -First 1
          if ($null -eq $html) {
            Write-Warning "LivingDoc.html not found under tests/IntegrationTests/bin/Release; skipping post-processing."
            return
          }
          ./scripts/postprocess-livingdoc.ps1 `
            -HtmlPath $html.FullName `
            -FaviconPath src/Client/public/favicon.ico `
            -Title 'RajFinancial Integration Tests'

      - name: Upload LivingDoc report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: livingdoc-report
          path: |
            tests/IntegrationTests/bin/Release/**/LivingDoc.html
            tests/IntegrationTests/bin/Release/**/LivingDoc.ndjson
          if-no-files-found: warn
          retention-days: 30

      - name: Fail job if integration tests failed
        if: steps.integration_tests.outcome == 'failure'
        run: |
          echo "::error::Integration tests failed — see livingdoc-report artifact for scenario-level results."
          exit 1

  migrate-prod:
    if: (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')) && needs.build.outputs.migrations_changed == 'true'
    runs-on: ubuntu-latest
    name: Migrate Prod DB
    needs: build
    environment: production
    steps:
      - name: Download migration script
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ef-migration-script

      - name: Azure Login with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migration to prod database
        shell: pwsh
        run: |
          Install-Module -Name SqlServer -Force -AllowClobber -Scope CurrentUser
          $token = az account get-access-token --resource "https://database.windows.net/" --query accessToken -o tsv
          Invoke-Sqlcmd -ServerInstance "rajfinancial.database.windows.net" -Database "rajfinancial" -AccessToken $token -InputFile migrations.sql -ErrorAction Stop
          Write-Host "Migration applied successfully to prod database"

  deploy-prod:
    runs-on: ubuntu-latest
    name: Deploy to Prod
    needs: [build, migrate-prod]
    if: ${{ always() && (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')) && needs.build.result == 'success' && (needs.migrate-prod.result == 'success' || needs.migrate-prod.result == 'skipped') }}
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: function-app
          path: ./publish

      - name: Azure Login with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@0bd707f87c0b6385742bab336c74e1afc61f6369 # v1
        with:
          app-name: func-rajfinancial-prod
          package: ./publish
          respect-funcignore: true

      - name: Health check and warmup
        run: |
          BASE_URL="https://func-rajfinancial-prod.azurewebsites.net"
          echo "Waiting for deployment to stabilize..."
          for i in 1 2 3 4 5 6; do
            echo "Health check attempt $i/6..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/health")
            if [ "$STATUS" != "000" ]; then
              echo "App is responding (HTTP $STATUS)"
              if [ "$STATUS" = "503" ]; then
                echo "Warning: DB connectivity degraded, but app is running"
              fi
              # Warm up auth middleware by hitting a protected endpoint
              # Accept any non-503 response (401 = middleware loaded)
              echo "Warming up auth middleware..."
              for j in 1 2 3 4 5 6; do
                echo "Warmup attempt $j/6..."
                MW_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BASE_URL/api/profile")
                if [ "$MW_STATUS" != "503" ] && [ "$MW_STATUS" != "000" ]; then
                  echo "Auth middleware ready (HTTP $MW_STATUS)"
                  exit 0
                fi
                echo "Auth middleware not ready (HTTP $MW_STATUS), retrying in 10s..."
                sleep 10
              done
              echo "Auth middleware warmup failed after 6 attempts"
              exit 1
            fi
            echo "No response from app (HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts — app not responding"
          exit 1

